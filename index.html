<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reh Dogg Ski Rush — Reh Dogg Games Plus</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Exo+2:wght@400;700;900&display=swap');

  :root {
    --snow: #e8f4ff;
    --ice: #b8ddff;
    --deep: #0a1628;
    --night: #060e1c;
    --neon-yellow: #ffe600;
    --neon-red: #ff2244;
    --neon-cyan: #00e5ff;
    --neon-green: #39ff14;
    --brand: #ff6b00;
    --tree: #1a5c2a;
    --tree-snow: #c8e8ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--night);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Exo 2', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  /* Scanline overlay */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  #wrapper {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* BRAND HEADER */
  #brand-bar {
    width: 520px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 12px;
    background: var(--deep);
    border: 2px solid var(--brand);
    border-bottom: none;
    border-radius: 8px 8px 0 0;
  }

  #brand-name {
    font-family: 'Bangers', cursive;
    font-size: 18px;
    color: var(--brand);
    letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(255,107,0,0.6);
  }

  #game-title {
    font-family: 'Bangers', cursive;
    font-size: 18px;
    color: var(--neon-cyan);
    letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(0,229,255,0.6);
  }

  /* HUD */
  #hud {
    width: 520px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 14px;
    background: var(--deep);
    border-left: 2px solid var(--brand);
    border-right: 2px solid var(--brand);
    z-index: 10;
  }

  .hud-block { display: flex; flex-direction: column; align-items: center; }
  .hud-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--ice);
    text-transform: uppercase;
    opacity: 0.7;
  }
  .hud-value {
    font-family: 'Bangers', cursive;
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--neon-yellow);
    text-shadow: 0 0 8px rgba(255,230,0,0.5);
    min-width: 80px;
    text-align: center;
  }

  /* LIVES */
  #lives-display { display: flex; gap: 4px; align-items: center; }
  .life-icon { font-size: 16px; }

  /* CANVAS */
  canvas {
    display: block;
    border: 2px solid var(--brand);
    box-shadow:
      0 0 30px rgba(255,107,0,0.3),
      0 0 60px rgba(0,229,255,0.1),
      inset 0 0 30px rgba(0,0,0,0.5);
  }

  /* SPEED BAR */
  #speed-bar-wrap {
    width: 520px;
    padding: 6px 14px;
    background: var(--deep);
    border-left: 2px solid var(--brand);
    border-right: 2px solid var(--brand);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .bar-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--ice);
    text-transform: uppercase;
    opacity: 0.7;
    white-space: nowrap;
  }
  #speed-bar-bg {
    flex: 1;
    height: 8px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    border: 1px solid rgba(255,255,255,0.1);
    overflow: hidden;
  }
  #speed-bar-fill {
    height: 100%;
    width: 10%;
    background: linear-gradient(90deg, var(--neon-green), var(--neon-yellow), var(--neon-red));
    border-radius: 4px;
    transition: width 0.2s;
  }

  /* FOOTER BAR */
  #footer-bar {
    width: 520px;
    padding: 5px 14px;
    background: var(--deep);
    border: 2px solid var(--brand);
    border-top: 1px solid rgba(255,107,0,0.3);
    border-radius: 0 0 8px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .controls-hint {
    font-size: 10px;
    color: var(--ice);
    opacity: 0.5;
    letter-spacing: 1px;
  }
  .copyright {
    font-size: 10px;
    color: var(--brand);
    opacity: 0.6;
    letter-spacing: 1px;
  }

  /* OVERLAY screens */
  #overlay {
    position: absolute;
    top: 38px; /* below brand bar */
    left: 0; right: 0;
    bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(6,14,28,0.88);
    backdrop-filter: blur(4px);
    z-index: 50;
    gap: 14px;
  }

  #overlay h1 {
    font-family: 'Bangers', cursive;
    font-size: 52px;
    color: var(--neon-yellow);
    text-shadow:
      3px 3px 0 var(--neon-red),
      0 0 30px rgba(255,230,0,0.5);
    letter-spacing: 4px;
    text-align: center;
    line-height: 1;
  }

  #overlay h2 {
    font-family: 'Bangers', cursive;
    font-size: 28px;
    color: var(--neon-cyan);
    letter-spacing: 3px;
    text-shadow: 0 0 12px rgba(0,229,255,0.5);
  }

  #overlay p {
    font-size: 13px;
    color: var(--ice);
    opacity: 0.8;
    text-align: center;
    letter-spacing: 1px;
    line-height: 1.7;
  }

  .btn {
    font-family: 'Bangers', cursive;
    font-size: 24px;
    letter-spacing: 3px;
    color: var(--deep);
    background: var(--neon-yellow);
    border: none;
    padding: 10px 40px;
    border-radius: 4px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 4px 4px 0 var(--brand), 0 0 20px rgba(255,230,0,0.4);
    text-transform: uppercase;
  }
  .btn:hover {
    transform: translate(-2px,-2px);
    box-shadow: 6px 6px 0 var(--brand), 0 0 30px rgba(255,230,0,0.6);
  }
  .btn:active {
    transform: translate(2px,2px);
    box-shadow: 2px 2px 0 var(--brand);
  }

  #high-score-display {
    font-family: 'Bangers', cursive;
    font-size: 16px;
    color: var(--neon-green);
    letter-spacing: 2px;
    text-shadow: 0 0 8px rgba(57,255,20,0.5);
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="wrapper">
  <div id="brand-bar">
    <span id="brand-name">⭐ REH DOGG GAMES PLUS</span>
    <span id="game-title">🎿 SKI RUSH</span>
  </div>

  <div id="hud">
    <div class="hud-block">
      <span class="hud-label">Score</span>
      <span class="hud-value" id="score-display">0</span>
    </div>
    <div class="hud-block">
      <span class="hud-label">High Score</span>
      <span class="hud-value" id="hi-display">0</span>
    </div>
    <div class="hud-block">
      <span class="hud-label">Lives</span>
      <div id="lives-display">
        <span class="life-icon">🎿</span>
        <span class="life-icon">🎿</span>
        <span class="life-icon">🎿</span>
      </div>
    </div>
    <div class="hud-block">
      <span class="hud-label">Level</span>
      <span class="hud-value" id="level-display">1</span>
    </div>
  </div>

  <canvas id="gameCanvas" width="520" height="520"></canvas>

  <div id="speed-bar-wrap">
    <span class="bar-label">Speed</span>
    <div id="speed-bar-bg"><div id="speed-bar-fill"></div></div>
  </div>

  <div id="footer-bar">
    <span class="controls-hint">← → ARROW KEYS &nbsp;|&nbsp; SPACE PAUSE</span>
    <span class="copyright">© 2026 REH DOGG GAMES PLUS</span>
  </div>

  <!-- Overlay -->
  <div id="overlay">
    <h1 id="overlay-title">SKI RUSH</h1>
    <h2 id="overlay-sub">REH DOGG GAMES PLUS</h2>
    <p id="overlay-msg">Dodge trees, rocks & avalanche bombs!<br>Collect ⭐ stars for bonus points.<br>← → to steer. SPACE to pause.</p>
    <div id="high-score-display" class="hidden">HIGH SCORE: <span id="hs-val">0</span></div>
    <button class="btn" id="start-btn" onclick="startGame()">START GAME</button>
  </div>
</div>

<script>
// ─── CONSTANTS ───────────────────────────────────────────────────────────────
const CANVAS_W = 520, CANVAS_H = 520;
const SKIER_W = 28, SKIER_H = 36;
const LANE_COUNT = 7;
const LANE_W = CANVAS_W / LANE_COUNT;

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = 'idle'; // idle | playing | paused | dead | gameover
let score = 0, highScore = 0, lives = 3, level = 1;
let scrollY = 0, baseSpeed = 2.8, speed = 2.8;
let skierX = CANVAS_W / 2;
let skierY = CANVAS_H - 80;
let invincible = false, invTimer = 0;
let flashTimer = 0;
let combo = 0, comboTimer = 0;
let frameCount = 0;
let keys = {};
let obstacles = [], pickups = [], particles = [], snowflakes = [];
let skierTrail = [];
let levelThresholds = [0,500,1200,2200,3500,5500,8000,12000,18000,99999];
let rAF;

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const scoreEl  = document.getElementById('score-display');
const hiEl     = document.getElementById('hi-display');
const lvlEl    = document.getElementById('level-display');
const livesEl  = document.getElementById('lives-display');
const speedFill= document.getElementById('speed-bar-fill');
const overlay  = document.getElementById('overlay');
const oTitle   = document.getElementById('overlay-title');
const oSub     = document.getElementById('overlay-sub');
const oMsg     = document.getElementById('overlay-msg');
const oHiWrap  = document.getElementById('high-score-display');
const oHiVal   = document.getElementById('hs-val');
const startBtn = document.getElementById('start-btn');

// ─── INPUT ────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') {
    e.preventDefault();
    if (state === 'playing') pauseGame();
    else if (state === 'paused') resumeGame();
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// Touch
let touchStartX = null;
canvas.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, {passive:true});
canvas.addEventListener('touchmove', e => {
  if (touchStartX === null) return;
  const dx = e.touches[0].clientX - touchStartX;
  if (Math.abs(dx) > 15) {
    keys['ArrowLeft'] = dx < 0;
    keys['ArrowRight'] = dx > 0;
  }
}, {passive:true});
canvas.addEventListener('touchend', () => {
  keys['ArrowLeft'] = false; keys['ArrowRight'] = false; touchStartX = null;
}, {passive:true});

// ─── INIT SNOW ────────────────────────────────────────────────────────────────
function initSnow() {
  snowflakes = [];
  for (let i = 0; i < 80; i++) {
    snowflakes.push({
      x: Math.random() * CANVAS_W,
      y: Math.random() * CANVAS_H,
      r: Math.random() * 2 + 0.5,
      sp: Math.random() * 1.2 + 0.4,
      drift: (Math.random() - 0.5) * 0.4
    });
  }
}

// ─── OBSTACLES & PICKUPS ──────────────────────────────────────────────────────
const OBS_TYPES = [
  { type:'tree',  w:30, h:38, pts:-1 },
  { type:'rock',  w:26, h:22, pts:-1 },
  { type:'mogul', w:34, h:16, pts:-1 },
  { type:'bomb',  w:28, h:28, pts:-1 },
];

function spawnObstacle() {
  const tpl = OBS_TYPES[Math.floor(Math.random() * (level < 3 ? 3 : OBS_TYPES.length))];
  const lane = Math.floor(Math.random() * LANE_COUNT);
  obstacles.push({
    type: tpl.type, w: tpl.w, h: tpl.h,
    x: lane * LANE_W + (LANE_W - tpl.w) / 2,
    y: -tpl.h - Math.random() * 40,
  });
}

function spawnPickup() {
  const types = ['star','coin','shield'];
  const t = types[Math.floor(Math.random() * (level < 2 ? 2 : types.length))];
  const lane = Math.floor(Math.random() * LANE_COUNT);
  pickups.push({
    type: t, w: 22, h: 22,
    x: lane * LANE_W + (LANE_W - 22) / 2,
    y: -30,
    angle: 0
  });
}

// ─── PARTICLES ───────────────────────────────────────────────────────────────
function burst(x, y, color, count=10) {
  for (let i = 0; i < count; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = Math.random() * 3 + 1;
    particles.push({
      x, y,
      vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - 2,
      life: 1, decay: Math.random() * 0.04 + 0.02,
      r: Math.random() * 4 + 2,
      color
    });
  }
}

// ─── DRAWING HELPERS ─────────────────────────────────────────────────────────
function drawMountainBg() {
  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
  sky.addColorStop(0, '#0a1628');
  sky.addColorStop(0.4, '#112244');
  sky.addColorStop(1, '#2a5580');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // Distant mountains
  ctx.fillStyle = '#0e2a4a';
  ctx.beginPath();
  ctx.moveTo(0, 180);
  ctx.lineTo(80, 60), ctx.lineTo(160, 130), ctx.lineTo(240, 30), ctx.lineTo(320, 110);
  ctx.lineTo(400, 50), ctx.lineTo(520, 140), ctx.lineTo(520, 180);
  ctx.closePath();
  ctx.fill();

  // Snow caps
  ctx.fillStyle = '#c8dfff';
  ctx.beginPath();
  ctx.moveTo(80,60), ctx.lineTo(60,90), ctx.lineTo(100,90); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(240,30), ctx.lineTo(215,70), ctx.lineTo(265,70); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(400,50), ctx.lineTo(375,80), ctx.lineTo(425,80); ctx.closePath(); ctx.fill();
}

function drawSlope() {
  // Slope / snow ground
  const ground = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
  ground.addColorStop(0, 'rgba(180,220,255,0.18)');
  ground.addColorStop(1, 'rgba(220,240,255,0.32)');
  ctx.fillStyle = ground;
  ctx.fillRect(0, 180, CANVAS_W, CANVAS_H - 180);

  // Scrolling ski tracks
  const trackAlpha = 0.12;
  ctx.strokeStyle = `rgba(180,220,255,${trackAlpha})`;
  ctx.lineWidth = 1.5;
  for (let lane = 1; lane < LANE_COUNT; lane++) {
    const x = lane * LANE_W;
    ctx.setLineDash([18, 20]);
    ctx.lineDashOffset = -scrollY % 38;
    ctx.beginPath();
    ctx.moveTo(x, 180); ctx.lineTo(x, CANVAS_H);
    ctx.stroke();
  }
  ctx.setLineDash([]);
}

function drawSkier() {
  const x = skierX, y = skierY;
  const lean = keys['ArrowLeft'] ? -0.18 : keys['ArrowRight'] ? 0.18 : 0;

  // Trail
  if (frameCount % 2 === 0) {
    skierTrail.push({x: x, y: y + SKIER_H/2, life: 1});
  }
  skierTrail = skierTrail.filter(t => t.life > 0);
  skierTrail.forEach(t => {
    ctx.globalAlpha = t.life * 0.3;
    ctx.fillStyle = '#c8e8ff';
    ctx.fillRect(t.x - 3, t.y, 6, 3);
    t.life -= 0.05;
  });
  ctx.globalAlpha = 1;

  // Invincible flash
  if (invincible && Math.floor(invTimer / 5) % 2 === 0) {
    ctx.globalAlpha = 0.4;
  }

  ctx.save();
  ctx.translate(x + SKIER_W/2, y + SKIER_H/2);
  ctx.rotate(lean);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.ellipse(0, SKIER_H/2 + 4, 12, 4, 0, 0, Math.PI*2);
  ctx.fill();

  // Body (jacket) - brand orange
  ctx.fillStyle = '#ff6b00';
  ctx.beginPath();
  ctx.roundRect(-8, -6, 16, 18, 3);
  ctx.fill();

  // Pants - deep blue
  ctx.fillStyle = '#1a3a6b';
  ctx.fillRect(-7, 10, 14, 8);

  // Head & helmet
  ctx.fillStyle = '#ffd0a0'; // face
  ctx.beginPath(); ctx.arc(0, -10, 6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#cc3300'; // helmet
  ctx.beginPath(); ctx.arc(0, -12, 6.5, Math.PI, 0); ctx.fill();
  ctx.fillStyle = '#cc3300';
  ctx.fillRect(-6.5, -12, 13, 4);

  // Goggles
  ctx.fillStyle = '#00e5ff';
  ctx.fillRect(-5, -11, 10, 4);
  ctx.fillStyle = 'rgba(0,229,255,0.3)';
  ctx.fillRect(-4, -10, 8, 2);

  // Poles
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-10, 0); ctx.lineTo(-16, 20); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(10, 0); ctx.lineTo(16, 20); ctx.stroke();

  // Skis
  ctx.fillStyle = '#ff6b00';
  ctx.fillRect(-10, 17, 8, 5);
  ctx.fillRect(2, 17, 8, 5);

  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawObstacle(obs) {
  const cx = obs.x + obs.w/2, cy = obs.y + obs.h/2;
  ctx.save();
  ctx.translate(cx, cy);

  if (obs.type === 'tree') {
    // Shadow
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.ellipse(0, obs.h/2+2, 10,3, 0,0,Math.PI*2); ctx.fill();
    // Trunk
    ctx.fillStyle='#5c3a1e';
    ctx.fillRect(-3, 4, 6, 14);
    // Layers
    const layers = [{r:14,y:-4,c:'#1a5c2a'},{r:11,y:-14,c:'#228b36'},{r:7,y:-22,c:'#2dad44'}];
    layers.forEach(l => {
      ctx.fillStyle = l.c;
      ctx.beginPath(); ctx.moveTo(-l.r, l.y+12); ctx.lineTo(0, l.y); ctx.lineTo(l.r, l.y+12); ctx.closePath(); ctx.fill();
      // Snow on top
      ctx.fillStyle = '#d0e8ff';
      ctx.beginPath(); ctx.moveTo(-l.r*0.5, l.y+5); ctx.lineTo(0, l.y+1); ctx.lineTo(l.r*0.5, l.y+5); ctx.closePath(); ctx.fill();
    });
  }

  else if (obs.type === 'rock') {
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.ellipse(2, obs.h/2+2, 13,4, 0,0,Math.PI*2); ctx.fill();
    const g = ctx.createRadialGradient(-4,-4,2,0,0,14);
    g.addColorStop(0,'#888'); g.addColorStop(1,'#333');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.moveTo(-13,-2); ctx.lineTo(-8,-10); ctx.lineTo(2,-12);
    ctx.lineTo(12,-6); ctx.lineTo(13,4); ctx.lineTo(4,9);
    ctx.lineTo(-6,8); ctx.lineTo(-13,2); ctx.closePath();
    ctx.fill();
    // Snow dusting
    ctx.fillStyle = 'rgba(200,220,255,0.4)';
    ctx.beginPath();
    ctx.moveTo(-8,-10); ctx.lineTo(2,-12); ctx.lineTo(7,-8); ctx.lineTo(-2,-6); ctx.closePath();
    ctx.fill();
  }

  else if (obs.type === 'mogul') {
    ctx.fillStyle='rgba(0,0,0,0.12)';
    ctx.ellipse(0, 6, 17,5, 0,0,Math.PI*2); ctx.fill();
    const mg = ctx.createRadialGradient(0,-2,2,0,2,17);
    mg.addColorStop(0,'#e8f4ff'); mg.addColorStop(1,'#a0c0e0');
    ctx.fillStyle = mg;
    ctx.beginPath(); ctx.ellipse(0, 0, 15,8, 0,0,Math.PI*2); ctx.fill();
  }

  else if (obs.type === 'bomb') {
    // Glowing warning bomb / avalanche trigger
    const pulse = 0.7 + 0.3 * Math.sin(frameCount * 0.15);
    ctx.shadowColor = '#ff2244';
    ctx.shadowBlur = 12 * pulse;
    ctx.fillStyle = '#cc0022';
    ctx.beginPath(); ctx.arc(0, 2, 11, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#555';
    ctx.fillRect(-2, -9, 4, 7);
    // Fuse spark
    ctx.fillStyle = `rgba(255,200,0,${pulse})`;
    ctx.beginPath(); ctx.arc(0, -10, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('!', 0, 2);
  }

  ctx.restore();
}

function drawPickup(p) {
  p.angle += 0.06;
  const cx = p.x + p.w/2, cy = p.y + p.h/2;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(p.angle);

  const pulse = 0.85 + 0.15 * Math.sin(frameCount * 0.12);
  ctx.scale(pulse, pulse);

  if (p.type === 'star') {
    ctx.shadowColor = '#ffe600'; ctx.shadowBlur = 14;
    ctx.fillStyle = '#ffe600';
    drawStar(ctx, 0, 0, 5, 10, 5);
    ctx.fill();
  } else if (p.type === 'coin') {
    ctx.shadowColor = '#ffa500'; ctx.shadowBlur = 10;
    ctx.fillStyle = '#ffa500';
    ctx.beginPath(); ctx.arc(0, 0, 9, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffdd00';
    ctx.beginPath(); ctx.arc(-1, -1, 6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#cc7700';
    ctx.font = 'bold 9px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('$', 0, 1);
  } else if (p.type === 'shield') {
    ctx.shadowColor = '#00e5ff'; ctx.shadowBlur = 14;
    ctx.fillStyle = '#00e5ff';
    ctx.beginPath();
    ctx.moveTo(0, -10); ctx.lineTo(9, -5); ctx.lineTo(9, 4);
    ctx.lineTo(0, 10); ctx.lineTo(-9, 4); ctx.lineTo(-9, -5);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('✦', 0, 1);
  }
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawStar(ctx, cx, cy, spikes, outerR, innerR) {
  let rot = (Math.PI / 2) * 3, step = Math.PI / spikes;
  ctx.beginPath();
  ctx.moveTo(cx, cy - outerR);
  for (let i = 0; i < spikes; i++) {
    ctx.lineTo(cx + Math.cos(rot) * outerR, cy + Math.sin(rot) * outerR); rot += step;
    ctx.lineTo(cx + Math.cos(rot) * innerR, cy + Math.sin(rot) * innerR); rot += step;
  }
  ctx.lineTo(cx, cy - outerR); ctx.closePath();
}

function drawParticles() {
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawSnow() {
  ctx.fillStyle = '#e0f0ff';
  snowflakes.forEach(s => {
    ctx.globalAlpha = 0.5 + s.r * 0.1;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;
}

function drawCombo() {
  if (comboTimer > 0 && combo >= 2) {
    const alpha = Math.min(1, comboTimer / 30);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#ffe600';
    ctx.font = `bold ${20 + combo*2}px 'Bangers', cursive`;
    ctx.textAlign = 'center';
    ctx.shadowColor = '#ff6b00'; ctx.shadowBlur = 10;
    ctx.fillText(`COMBO x${combo}!`, CANVAS_W/2, CANVAS_H/2 - 80);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }
}

function drawFloatingScore(text, x, y, color='#ffe600') {
  // handled via particles system timing; we'll just draw above
}

// ─── UPDATE ───────────────────────────────────────────────────────────────────
function update() {
  frameCount++;
  scrollY += speed;

  // Skier movement
  const moveSpeed = 3.4 + level * 0.2;
  if (keys['ArrowLeft'])  skierX = Math.max(4, skierX - moveSpeed);
  if (keys['ArrowRight']) skierX = Math.min(CANVAS_W - SKIER_W - 4, skierX + moveSpeed);

  // Snow
  snowflakes.forEach(s => {
    s.y += s.sp + speed * 0.15;
    s.x += s.drift;
    if (s.y > CANVAS_H) { s.y = -4; s.x = Math.random() * CANVAS_W; }
    if (s.x < 0) s.x = CANVAS_W; if (s.x > CANVAS_W) s.x = 0;
  });

  // Spawn obstacles
  const spawnRate = Math.max(30, 80 - level * 8);
  if (frameCount % spawnRate === 0) spawnObstacle();
  // Cluster spawn at higher levels
  if (level >= 4 && frameCount % (spawnRate * 2) === 0) spawnObstacle();

  // Spawn pickups
  const pickRate = Math.max(80, 160 - level * 10);
  if (frameCount % pickRate === 0) spawnPickup();

  // Move obstacles
  obstacles.forEach(o => { o.y += speed + level * 0.15; });
  obstacles = obstacles.filter(o => o.y < CANVAS_H + 60);

  // Move pickups
  pickups.forEach(p => { p.y += speed * 0.85; });
  pickups = pickups.filter(p => p.y < CANVAS_H + 40);

  // Particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= p.decay; });
  particles = particles.filter(p => p.life > 0);

  // Invincibility
  if (invincible) { invTimer--; if (invTimer <= 0) invincible = false; }
  if (comboTimer > 0) comboTimer--;

  // Collision: obstacles
  if (!invincible) {
    for (let obs of obstacles) {
      if (rectsOverlap(skierX, skierY, SKIER_W-4, SKIER_H-4, obs.x+4, obs.y+4, obs.w-8, obs.h-8)) {
        hitObstacle(obs);
        obstacles = obstacles.filter(o => o !== obs);
        break;
      }
    }
  }

  // Collision: pickups
  for (let p of pickups) {
    if (rectsOverlap(skierX, skierY, SKIER_W, SKIER_H, p.x, p.y, p.w, p.h)) {
      collectPickup(p);
      pickups = pickups.filter(pp => pp !== p);
    }
  }

  // Score from distance
  if (frameCount % 6 === 0) {
    score += 1 + Math.floor(level / 2);
    updateHUD();
  }

  // Speed ramp
  speed = baseSpeed + level * 0.35 + score * 0.0002;
  speed = Math.min(speed, 10);
  speedFill.style.width = Math.min(100, ((speed - baseSpeed) / (10 - baseSpeed)) * 100 + 8) + '%';

  // Level up
  if (score >= levelThresholds[level] && level < levelThresholds.length - 1) {
    level++;
    lvlEl.textContent = level;
    burst(CANVAS_W/2, CANVAS_H/2, '#ffe600', 20);
  }
}

function rectsOverlap(ax,ay,aw,ah, bx,by,bw,bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function hitObstacle(obs) {
  combo = 0;
  burst(skierX + SKIER_W/2, skierY + SKIER_H/2, '#ff2244', 16);
  lives--;
  updateLives();
  if (lives <= 0) {
    gameOver();
  } else {
    invincible = true;
    invTimer = 120;
    flashTimer = 30;
  }
}

function collectPickup(p) {
  if (p.type === 'star') {
    combo++;
    comboTimer = 90;
    const pts = 100 * combo;
    score += pts;
    burst(p.x + p.w/2, p.y + p.h/2, '#ffe600', 12);
  } else if (p.type === 'coin') {
    score += 50;
    burst(p.x + p.w/2, p.y + p.h/2, '#ffa500', 8);
  } else if (p.type === 'shield') {
    invincible = true;
    invTimer = 200;
    burst(p.x + p.w/2, p.y + p.h/2, '#00e5ff', 14);
  }
  updateHUD();
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
function updateHUD() {
  scoreEl.textContent = score;
  if (score > highScore) { highScore = score; hiEl.textContent = highScore; }
}

function updateLives() {
  const icons = livesEl.querySelectorAll('.life-icon');
  icons.forEach((ic, i) => {
    ic.style.opacity = i < lives ? '1' : '0.2';
    ic.style.filter = i < lives ? '' : 'grayscale(1)';
  });
}

// ─── GAME LOOP ────────────────────────────────────────────────────────────────
function gameLoop() {
  if (state !== 'playing') return;
  update();
  render();
  rAF = requestAnimationFrame(gameLoop);
}

function render() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  drawMountainBg();
  drawSlope();
  drawSnow();
  obstacles.forEach(drawObstacle);
  pickups.forEach(drawPickup);
  drawSkier();
  drawParticles();
  drawCombo();

  // Invincible glow ring
  if (invincible) {
    const a = 0.4 + 0.3 * Math.sin(frameCount * 0.25);
    ctx.strokeStyle = `rgba(0,229,255,${a})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.ellipse(skierX + SKIER_W/2, skierY + SKIER_H/2, 22, 26, 0, 0, Math.PI*2);
    ctx.stroke();
  }
}

// ─── GAME CONTROL ────────────────────────────────────────────────────────────
function startGame() {
  score = 0; lives = 3; level = 1; speed = baseSpeed; frameCount = 0;
  combo = 0; comboTimer = 0; invincible = false; invTimer = 0;
  obstacles = []; pickups = []; particles = []; skierTrail = [];
  skierX = CANVAS_W / 2 - SKIER_W / 2;
  skierY = CANVAS_H - 90;
  scrollY = 0;

  updateHUD();
  updateLives();
  lvlEl.textContent = 1;
  speedFill.style.width = '8%';

  initSnow();
  overlay.classList.add('hidden');
  state = 'playing';
  gameLoop();
}

function pauseGame() {
  state = 'paused';
  cancelAnimationFrame(rAF);
  oTitle.textContent = 'PAUSED';
  oSub.textContent = '';
  oMsg.textContent = 'Press SPACE to resume';
  oHiWrap.classList.add('hidden');
  startBtn.textContent = 'RESUME';
  startBtn.onclick = resumeGame;
  overlay.classList.remove('hidden');
}

function resumeGame() {
  state = 'playing';
  overlay.classList.add('hidden');
  gameLoop();
}

function gameOver() {
  state = 'gameover';
  cancelAnimationFrame(rAF);
  setTimeout(() => {
    oTitle.textContent = 'GAME OVER';
    oSub.textContent = `SCORE: ${score}`;
    oMsg.textContent = 'Better luck next run, skier!';
    oHiWrap.classList.remove('hidden');
    oHiVal.textContent = highScore;
    startBtn.textContent = 'TRY AGAIN';
    startBtn.onclick = startGame;
    overlay.classList.remove('hidden');
  }, 600);
}

// ─── IDLE ANIMATION ───────────────────────────────────────────────────────────
initSnow();
(function idleLoop() {
  if (state !== 'idle') return;
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  drawMountainBg();
  drawSlope();
  scrollY += 1.5;
  frameCount++;
  snowflakes.forEach(s => {
    s.y += s.sp; s.x += s.drift;
    if (s.y > CANVAS_H) { s.y = -4; s.x = Math.random() * CANVAS_W; }
  });
  drawSnow();
  requestAnimationFrame(idleLoop);
})();
</script>
