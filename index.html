<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Reh Dogg Games Plus | Shell Shock - Real Spinning Shells</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f2a, #02030c);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'VT323', monospace;
            padding: 20px;
        }
        .cabinet {
            background: linear-gradient(145deg, #0f122e, #050714);
            border-radius: 48px;
            padding: 20px 24px 30px;
            border: 3px solid #ffd966;
            box-shadow: 0 0 0 6px #2a1e3a, 0 20px 40px black, inset 0 0 20px rgba(255, 217, 0, 0.3);
            max-width: 750px;
            width: 100%;
        }
        .marquee {
            text-align: center;
            background: #010a15;
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 24px;
            border-bottom: 3px solid #ffcc44;
            box-shadow: inset 0 0 12px gold, 0 6px 0 #3a2e1a;
        }
        .logo {
            font-size: clamp(1.2rem, 5vw, 2rem);
            font-weight: 900;
            background: linear-gradient(135deg, #ffd966, #ffaa33, #ff5500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub {
            color: #7ffbff;
            font-size: 0.75rem;
            margin-top: 6px;
        }
        .score-panel {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 24px;
        }
        .card {
            background: #030a1acc;
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 8px 12px;
            flex: 1;
            text-align: center;
            border: 1px solid #ffd966;
            box-shadow: 0 5px 0 #001e2a;
        }
        .card-label {
            font-size: 0.7rem;
            color: #8dd0ff;
        }
        .card-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd966;
            text-shadow: 0 0 8px #ffaa33;
        }
        /* Shell Arena */
        .arena {
            position: relative;
            min-height: 200px;
            margin: 20px 0;
        }
        .slot-row {
            display: flex;
            justify-content: center;
            gap: 35px;
            position: relative;
            z-index: 5;
        }
        .slot {
            width: 120px;
            height: 120px;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }
        /* Real half‑shell */
        .shell {
            position: absolute;
            bottom: 0;
            width: 110px;
            height: 90px;
            background: radial-gradient(ellipse at 35% 30%, #e6b87e, #b56a2e, #7a4012);
            border-radius: 50% 50% 45% 45% / 60% 60% 25% 25%;
            box-shadow: 0 12px 12px rgba(0,0,0,0.4), inset 0 2px 6px rgba(255,230,160,0.8);
            cursor: pointer;
            transition: transform 0.08s linear;
            will-change: transform;
            border-bottom: 3px solid #5a2a0a;
        }
        .shell::before {
            content: "";
            position: absolute;
            top: 8px;
            left: 15%;
            width: 70%;
            height: 28%;
            background: radial-gradient(ellipse, rgba(255,240,170,0.7), transparent);
            border-radius: 50%;
            pointer-events: none;
        }
        .shell::after {
            content: "";
            position: absolute;
            bottom: -10px;
            left: 20%;
            width: 60%;
            height: 14px;
            background: rgba(0,0,0,0.4);
            border-radius: 50%;
            filter: blur(4px);
            pointer-events: none;
        }
        .ball-icon {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.2rem;
            display: none;
            filter: drop-shadow(0 4px 4px black);
            pointer-events: none;
            z-index: 10;
        }
        .shell.active .ball-icon {
            display: block;
        }
        /* Shuffle animation (spinning swap) */
        .shell.animating {
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            z-index: 20;
        }
        .message-area {
            background: #021a24aa;
            border-radius: 60px;
            padding: 12px;
            margin: 20px 0;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            backdrop-filter: blur(8px);
            border: 1px solid cyan;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }
        .arcade-btn {
            background: #1f1a2e;
            border: none;
            font-family: monospace;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 12px 28px;
            border-radius: 60px;
            color: #ffdf8c;
            box-shadow: 0 6px 0 #2a1a3a;
            cursor: pointer;
            touch-action: manipulation;
        }
        .arcade-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #2a1a3a;
        }
        @media (max-width: 550px) {
            .slot { width: 90px; }
            .shell { width: 82px; height: 68px; }
            .ball-icon { font-size: 1.6rem; bottom: 12px; }
            .card-value { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="cabinet">
    <div class="marquee"><div class="logo">🔥 REH DOGG: SHELL SHOCK 🔥</div><div class="sub">⚡ SPINNING SHELLS · TRACK THE BALL ⚡</div></div>
    <div class="score-panel">
        <div class="card"><div class="card-label">🎲 SCORE</div><div class="card-value" id="scoreDisplay">0</div></div>
        <div class="card"><div class="card-label">🏆 HIGH SCORE</div><div class="card-value" id="highScoreDisplay">0</div></div>
        <div class="card"><div class="card-label">🎯 STREAK</div><div class="card-value" id="streakDisplay">0</div></div>
    </div>
    <div class="arena">
        <div class="slot-row" id="slotRow">
            <div class="slot" data-slot="0"></div>
            <div class="slot" data-slot="1"></div>
            <div class="slot" data-slot="2"></div>
        </div>
    </div>
    <div class="message-area" id="gameMessage"><span class="message-text">🕹️ PRESS START TO PLAY 🕹️</span></div>
    <div class="controls"><button class="arcade-btn" id="startBtn">🌀 START GAME</button><button class="arcade-btn" id="resetBtn">🔄 RESET SCORE</button></div>
</div>
<script>
(function(){
    // ---------- SIMPLE AUDIO ----------
    const SafeAudio = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null, soundEnabled = true;
    function initAudio() { if(!SafeAudio){ soundEnabled=false; return; } if(!audioCtx) audioCtx=new SafeAudio(); if(audioCtx.state==='suspended') audioCtx.resume(); }
    function beep(f=880,d=0.12,v=0.2) { if(!audioCtx||!soundEnabled) return; try{ const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.value=f; g.gain.value=v; o.type='sine'; o.start(); g.gain.exponentialRampToValueAtTime(0.00001,audioCtx.currentTime+d); o.stop(audioCtx.currentTime+d); }catch(e){} }
    function win() { beep(880,0.1); setTimeout(()=>beep(1100,0.12),80); setTimeout(()=>beep(1320,0.15),160); }
    function lose() { beep(440,0.2); setTimeout(()=>beep(330,0.25),150); }
    function swapSound() { beep(660,0.07); setTimeout(()=>beep(550,0.07),70); }
    // ---------- STORAGE ----------
    const KEY='rehdogg_shell_high';
    function loadHigh(){ try{ return parseInt(localStorage.getItem(KEY),10)||0; }catch(e){ return 0; } }
    function saveHigh(v){ try{ localStorage.setItem(KEY,String(v)); }catch(e){} }
    // ---------- DOM ----------
    const slots = document.querySelectorAll('.slot');
    let shells = []; // each: {dom, slotIndex, hasBall, id}
    let nextId = 0;
    let score = 0, high = 0, streak = 0;
    let gameActive = false, shuffling = false;
    let autoTimer = null;
    let ballShellId = null;
    const scoreEl = document.getElementById('scoreDisplay');
    const highEl = document.getElementById('highScoreDisplay');
    const streakEl = document.getElementById('streakDisplay');
    const msgSpan = document.querySelector('#gameMessage .message-text');
    function msg(txt, col="#0ff") { if(msgSpan){ msgSpan.innerHTML=txt; msgSpan.style.color=col; } }
    function updateUI() {
        scoreEl.innerText = score;
        streakEl.innerText = streak;
        if(score > high) { high = score; highEl.innerText = high; saveHigh(high); }
    }
    // ---------- CREATE SHELLS ----------
    function createShell(slotIdx) {
        const shellDiv = document.createElement('div');
        shellDiv.className = 'shell';
        const ballSpan = document.createElement('span');
        ballSpan.className = 'ball-icon';
        ballSpan.textContent = '⚾';
        shellDiv.appendChild(ballSpan);
        slots[slotIdx].appendChild(shellDiv);
        const id = nextId++;
        const obj = { dom: shellDiv, slotIndex: slotIdx, hasBall: false, id: id };
        shellDiv.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if(!gameActive || shuffling) return;
            pickShell(obj.id);
        });
        return obj;
    }
    function rebuildShells() {
        slots.forEach(s => s.innerHTML = '');
        shells = [];
        nextId = 0;
        for(let i=0; i<3; i++) shells.push(createShell(i));
    }
    // ---------- SPINNING SWAP (arc + rotation) ----------
    function swapShells(shellA, shellB, onDone) {
        if(shellA.id === shellB.id) { if(onDone) onDone(); return; }
        const slotA = shellA.slotIndex;
        const slotB = shellB.slotIndex;
        // get slot positions
        const rectA = slots[slotA].getBoundingClientRect();
        const rectB = slots[slotB].getBoundingClientRect();
        const arenaRect = document.querySelector('.arena').getBoundingClientRect();
        const startX = rectA.left + rectA.width/2 - arenaRect.left;
        const startY = rectA.top + rectA.height/2 - arenaRect.top;
        const endX = rectB.left + rectB.width/2 - arenaRect.left;
        const endY = rectB.top + rectB.height/2 - arenaRect.top;
        const startXB = rectB.left + rectB.width/2 - arenaRect.left;
        const startYB = rectB.top + rectB.height/2 - arenaRect.top;
        const endXB = rectA.left + rectA.width/2 - arenaRect.left;
        const endYB = rectA.top + rectA.height/2 - arenaRect.top;
        const domA = shellA.dom;
        const domB = shellB.dom;
        // store original styles
        domA.style.transition = 'none';
        domB.style.transition = 'none';
        domA.style.position = 'absolute';
        domA.style.left = startX + 'px';
        domA.style.top = startY + 'px';
        domA.style.width = '110px';
        domA.style.height = '90px';
        domA.style.marginLeft = '-55px';
        domA.style.marginTop = '-45px';
        domA.style.zIndex = '30';
        domB.style.position = 'absolute';
        domB.style.left = startXB + 'px';
        domB.style.top = startYB + 'px';
        domB.style.width = '110px';
        domB.style.height = '90px';
        domB.style.marginLeft = '-55px';
        domB.style.marginTop = '-45px';
        domB.style.zIndex = '30';
        domA.classList.add('animating');
        domB.classList.add('animating');
        swapSound();
        const duration = 300;
        const startTime = performance.now();
        function step(now) {
            let t = Math.min(1, (now - startTime) / duration);
            const ease = t<0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
            // arc: A goes up, B goes down
            const arcA = Math.sin(t * Math.PI) * 45;
            const arcB = -Math.sin(t * Math.PI) * 45;
            const curXA = startX + (endX - startX) * ease;
            const curYA = startY + (endY - startY) * ease + arcA;
            const curXB = startXB + (endXB - startXB) * ease;
            const curYB = startYB + (endYB - startYB) * ease + arcB;
            domA.style.left = curXA + 'px';
            domA.style.top = curYA + 'px';
            domB.style.left = curXB + 'px';
            domB.style.top = curYB + 'px';
            // add rotation
            const rotA = Math.sin(t * Math.PI) * 25;
            const rotB = Math.sin(t * Math.PI) * -25;
            domA.style.transform = `rotate(${rotA}deg)`;
            domB.style.transform = `rotate(${rotB}deg)`;
            if(t < 1) requestAnimationFrame(step);
            else {
                // attach to new slots
                slots[slotB].appendChild(domA);
                slots[slotA].appendChild(domB);
                // reset styles
                domA.style.position = '';
                domA.style.left = '';
                domA.style.top = '';
                domA.style.width = '';
                domA.style.height = '';
                domA.style.marginLeft = '';
                domA.style.marginTop = '';
                domA.style.zIndex = '';
                domA.style.transform = '';
                domA.classList.remove('animating');
                domB.style.position = '';
                domB.style.left = '';
                domB.style.top = '';
                domB.style.width = '';
                domB.style.height = '';
                domB.style.marginLeft = '';
                domB.style.marginTop = '';
                domB.style.zIndex = '';
                domB.style.transform = '';
                domB.classList.remove('animating');
                // update slot indices
                shellA.slotIndex = slotB;
                shellB.slotIndex = slotA;
                if(onDone) onDone();
            }
        }
        requestAnimationFrame(step);
    }
    function shuffleSequence(steps, onComplete) {
        if(steps <= 0) { if(onComplete) onComplete(); return; }
        let left = steps;
        function next() {
            if(left <= 0) { if(onComplete) onComplete(); return; }
            let a = Math.floor(Math.random() * shells.length);
            let b = Math.floor(Math.random() * shells.length);
            while(a === b) b = Math.floor(Math.random() * shells.length);
            swapShells(shells[a], shells[b], () => {
                left--;
                next();
            });
        }
        next();
    }
    // ---------- GAME ROUND ----------
    function startRound() {
        if(shuffling) return;
        clearTimeout(autoTimer);
        gameActive = false;
        // reset highlights
        shells.forEach(s => s.dom.classList.remove('active'));
        // place ball under random shell
        const randomIdx = Math.floor(Math.random() * shells.length);
        ballShellId = shells[randomIdx].id;
        shells.forEach(s => s.hasBall = (s.id === ballShellId));
        const ballShell = shells.find(s => s.hasBall);
        ballShell.dom.classList.add('active');
        msg("👀 WATCH THE SHELL WITH THE BALL... 👀", "#7ffbff");
        setTimeout(() => {
            // hide ball
            shells.forEach(s => s.dom.classList.remove('active'));
            msg("🌀 WATCH THE SHELLS SPIN! 🌀", "#ffd966");
            shuffling = true;
            const swaps = 10 + Math.floor(Math.random() * 8); // 10-17 swaps
            shuffleSequence(swaps, () => {
                shuffling = false;
                gameActive = true;
                msg("🎯 PICK A SHELL! 🎯", "#ffd966");
                // glow effect
                shells.forEach(s => s.dom.style.filter = "drop-shadow(0 0 8px gold)");
                setTimeout(() => shells.forEach(s => s.dom.style.filter = ""), 700);
            });
        }, 1400);
    }
    function pickShell(shellId) {
        if(!gameActive || shuffling) return;
        gameActive = false;
        const chosen = shells.find(s => s.id === shellId);
        const ballShell = shells.find(s => s.hasBall);
        ballShell.dom.classList.add('active');
        if(chosen.hasBall) {
            const points = 10 + (streak * 2);
            score += points;
            streak++;
            updateUI();
            win();
            msg(`🎉 CORRECT! +${points} POINTS! STREAK ${streak}! 🎉`, "#8cff4f");
            autoTimer = setTimeout(() => startRound(), 1400);
        } else {
            streak = 0;
            updateUI();
            lose();
            msg(`❌ WRONG! BALL WAS UNDER SHELL ${ballShell.slotIndex+1}. ❌`, "#ff7777");
            autoTimer = setTimeout(() => startRound(), 1800);
        }
    }
    function resetScore() {
        clearTimeout(autoTimer);
        if(shuffling) return;
        score = 0; streak = 0;
        updateUI();
        gameActive = false;
        shells.forEach(s => s.dom.classList.remove('active'));
        msg("✨ SCORE RESET! PRESS START ✨", "#ffd966");
    }
    function startGame() {
        if(shuffling) return;
        initAudio();
        clearTimeout(autoTimer);
        score = 0; streak = 0;
        updateUI();
        rebuildShells();   // fresh positions
        startRound();
    }
    // ---------- BIND ----------
    document.getElementById('startBtn').addEventListener('pointerdown', (e) => { e.preventDefault(); startGame(); });
    document.getElementById('resetBtn').addEventListener('pointerdown', (e) => { e.preventDefault(); initAudio(); resetScore(); });
    // initial
    rebuildShells();
    high = loadHigh();
    highEl.innerText = high;
    updateUI();
    msg("🕹️ PRESS START GAME 🕹️", "#0ff");
    document.body.addEventListener('pointerdown', () => { if(audioCtx && audioCtx.state==='suspended') audioCtx.resume(); }, { once: true });
})();
</script>
</body>
</html>
