<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Reh Dogg Games Plus | Shell Shock - Real Arc Shuffle</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f2a, #02030c);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'VT323', monospace;
            padding: 20px;
        }
        /* arcade cabinet */
        .cabinet {
            background: linear-gradient(145deg, #0f122e, #050714);
            border-radius: 48px;
            padding: 20px 24px 30px;
            border: 3px solid #ffd966;
            box-shadow: 0 0 0 6px #2a1e3a, 0 20px 40px black, inset 0 0 20px rgba(255, 217, 0, 0.3);
            max-width: 800px;
            width: 100%;
        }
        .marquee {
            text-align: center;
            background: #010a15;
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 24px;
            border-bottom: 3px solid #ffcc44;
            box-shadow: inset 0 0 12px gold, 0 6px 0 #3a2e1a;
        }
        .logo {
            font-size: clamp(1.2rem, 5vw, 2rem);
            font-weight: 900;
            background: linear-gradient(135deg, #ffd966, #ffaa33, #ff5500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .sub {
            color: #7ffbff;
            font-size: 0.75rem;
            margin-top: 6px;
        }
        .score-panel {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 24px;
        }
        .card {
            background: #030a1acc;
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 8px 12px;
            flex: 1;
            text-align: center;
            border: 1px solid #ffd966;
            box-shadow: 0 5px 0 #001e2a;
        }
        .card-label {
            font-size: 0.7rem;
            color: #8dd0ff;
        }
        .card-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd966;
            text-shadow: 0 0 8px #ffaa33;
        }
        /* shell arena */
        .shell-arena {
            position: relative;
            min-height: 220px;
            margin: 20px 0;
        }
        .slot-container {
            position: relative;
            width: 100%;
            height: 180px;
            display: flex;
            justify-content: center;
            gap: 40px;
            align-items: flex-end;
        }
        .slot {
            position: relative;
            width: 120px;
            height: 140px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            pointer-events: none;
        }
        /* real half‑shell look */
        .shell {
            position: absolute;
            width: 110px;
            height: 90px;
            background: radial-gradient(ellipse at 35% 30%, #f0c08a, #b87a3c, #8b4e1a);
            border-radius: 50% 50% 45% 45% / 60% 60% 30% 30%;
            box-shadow: 0 10px 15px rgba(0,0,0,0.4), inset 0 2px 5px rgba(255,240,180,0.7);
            cursor: pointer;
            transition: transform 0.08s linear;
            will-change: transform;
            pointer-events: auto;
            /* inner rim */
            border-bottom: 3px solid #5a2e0e;
        }
        .shell::before {
            content: "";
            position: absolute;
            top: 8px;
            left: 15%;
            width: 70%;
            height: 30%;
            background: radial-gradient(ellipse, rgba(255,230,150,0.6), transparent);
            border-radius: 50%;
            pointer-events: none;
        }
        .shell::after {
            content: "";
            position: absolute;
            bottom: -8px;
            left: 20%;
            width: 60%;
            height: 12px;
            background: rgba(0,0,0,0.3);
            border-radius: 50%;
            filter: blur(3px);
            pointer-events: none;
        }
        /* ball inside shell */
        .ball-icon {
            position: absolute;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2.2rem;
            display: none;
            filter: drop-shadow(0 4px 4px black);
            pointer-events: none;
            z-index: 15;
        }
        .shell.active .ball-icon {
            display: block;
        }
        /* shimmer effect when revealed */
        .shell.revealed {
            animation: shellPop 0.2s ease-out;
        }
        @keyframes shellPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.08) translateY(-6px); }
            100% { transform: scale(1); }
        }
        /* message area */
        .message-area {
            background: #021a24aa;
            border-radius: 60px;
            padding: 12px;
            margin: 20px 0;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            backdrop-filter: blur(8px);
            border: 1px solid cyan;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .message-text {
            text-shadow: 0 0 6px cyan;
        }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }
        .arcade-btn {
            background: #1f1a2e;
            border: none;
            font-family: monospace;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 12px 28px;
            border-radius: 60px;
            color: #ffdf8c;
            box-shadow: 0 6px 0 #2a1a3a;
            cursor: pointer;
            touch-action: manipulation;
        }
        .arcade-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #2a1a3a;
        }
        @media (max-width: 600px) {
            .slot { width: 90px; }
            .shell { width: 82px; height: 68px; }
            .ball-icon { font-size: 1.6rem; bottom: 12px; }
            .card-value { font-size: 1.2rem; }
            .arcade-btn { padding: 8px 18px; font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="cabinet">
    <div class="marquee"><div class="logo">🔥 REH DOGG: SHELL SHOCK 🔥</div><div class="sub">⚡ REAL ARC SHUFFLE · TRACK THE BALL ⚡</div></div>
    <div class="score-panel">
        <div class="card"><div class="card-label">🎲 SCORE</div><div class="card-value" id="scoreDisplay">0</div></div>
        <div class="card"><div class="card-label">🏆 HIGH SCORE</div><div class="card-value" id="highScoreDisplay">0</div></div>
        <div class="card"><div class="card-label">🎯 STREAK</div><div class="card-value" id="streakDisplay">0</div></div>
    </div>
    <div class="shell-arena">
        <div class="slot-container" id="slotContainer">
            <div class="slot" data-slot="0"></div>
            <div class="slot" data-slot="1"></div>
            <div class="slot" data-slot="2"></div>
        </div>
    </div>
    <div class="message-area" id="gameMessage"><span class="message-text">🕹️ PRESS START TO PLAY 🕹️</span></div>
    <div class="controls"><button class="arcade-btn" id="startBtn">🌀 START GAME</button><button class="arcade-btn" id="resetBtn">🔄 RESET SCORE</button></div>
</div>
<script>
    (function(){
        // ---------- AUDIO ----------
        const SafeAudio = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null, soundEnabled = true;
        function initAudio() { if(!SafeAudio){ soundEnabled=false; return; } if(!audioCtx) audioCtx=new SafeAudio(); if(audioCtx.state==='suspended') audioCtx.resume(); }
        function playBeep(freq=880,dur=0.12,vol=0.2) { if(!audioCtx||!soundEnabled) return; try{ const o=audioCtx.createOscillator(), g=audioCtx.createGain(); o.connect(g); g.connect(audioCtx.destination); o.frequency.value=freq; g.gain.value=vol; o.type='sine'; o.start(); g.gain.exponentialRampToValueAtTime(0.00001,audioCtx.currentTime+dur); o.stop(audioCtx.currentTime+dur); }catch(e){} }
        function playWin() { playBeep(880,0.1,0.25); setTimeout(()=>playBeep(1100,0.12,0.25),80); setTimeout(()=>playBeep(1320,0.15,0.2),160); }
        function playLose() { playBeep(440,0.2,0.22); setTimeout(()=>playBeep(330,0.25,0.2),150); }
        function playSwapSound() { playBeep(660,0.06,0.18); setTimeout(()=>playBeep(550,0.06,0.18),70); }
        // ---------- STORAGE ----------
        const STORAGE_KEY='rehdogg_shell_high';
        function loadHighScore() { try{ return parseInt(localStorage.getItem(STORAGE_KEY),10)||0; }catch(e){ return 0; } }
        function saveHighScore(v) { try{ localStorage.setItem(STORAGE_KEY,String(v)); }catch(e){} }
        // ---------- DOM ----------
        const slotContainer = document.getElementById('slotContainer');
        let shells = [];          // each shell is { dom, slotIndex, hasBall, id }
        let nextShellId = 0;
        let score = 0, highScore = 0, streak = 0;
        let gameActive = false;
        let isShuffling = false;
        let autoRoundTimer = null;
        let activeBallShellId = null;   // which shell (by id) currently holds the ball
        const scoreDisplay = document.getElementById('scoreDisplay');
        const highScoreDisplay = document.getElementById('highScoreDisplay');
        const streakDisplay = document.getElementById('streakDisplay');
        const messageSpan = document.querySelector('#gameMessage .message-text');
        function setMessage(txt, col="#0ff") { if(messageSpan){ messageSpan.innerHTML=txt; messageSpan.style.color=col; } }
        function updateUI() {
            scoreDisplay.innerText = score;
            streakDisplay.innerText = streak;
            if(score > highScore) { highScore = score; highScoreDisplay.innerText = highScore; saveHighScore(highScore); }
        }
        // ---------- CREATE SHELLS ----------
        function createShell(slotIndex) {
            const shellDiv = document.createElement('div');
            shellDiv.className = 'shell';
            const ballSpan = document.createElement('span');
            ballSpan.className = 'ball-icon';
            ballSpan.textContent = '⚾';
            shellDiv.appendChild(ballSpan);
            const slot = slotContainer.children[slotIndex];
            slot.appendChild(shellDiv);
            const id = nextShellId++;
            const shellObj = { dom: shellDiv, slotIndex: slotIndex, hasBall: false, id: id };
            // position absolutely within slot (slot is relative)
            shellDiv.style.position = 'absolute';
            shellDiv.style.bottom = '0px';
            shellDiv.style.left = '50%';
            shellDiv.style.transform = 'translateX(-50%)';
            shellDiv.style.transition = 'transform 0.08s';
            shellDiv.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                e.stopPropagation();
                if(!gameActive || isShuffling) return;
                pickShell(shellObj.id);
            });
            return shellObj;
        }
        function initShells() {
            // clear slots
            for(let i=0; i<slotContainer.children.length; i++) {
                slotContainer.children[i].innerHTML = '';
            }
            shells = [];
            nextShellId = 0;
            for(let i=0; i<3; i++) {
                const s = createShell(i);
                shells.push(s);
            }
        }
        // ---------- ANIMATED SWAP WITH ARC ----------
        function getSlotCenter(slotIndex) {
            const slotElem = slotContainer.children[slotIndex];
            const rect = slotElem.getBoundingClientRect();
            const containerRect = slotContainer.parentElement.getBoundingClientRect();
            return {
                x: rect.left + rect.width/2 - containerRect.left,
                y: rect.top + rect.height/2 - containerRect.top
            };
        }
        function animateArcSwap(shellA, shellB, onComplete) {
            const slotA = shellA.slotIndex;
            const slotB = shellB.slotIndex;
            const startPos = getSlotCenter(slotA);
            const endPos = getSlotCenter(slotB);
            const startPosB = getSlotCenter(slotB);
            const endPosB = getSlotCenter(slotA);
            const duration = 280; // ms
            const startTime = performance.now();
            const domA = shellA.dom;
            const domB = shellB.dom;
            // save original transition and transform
            const origTransition = domA.style.transition;
            domA.style.transition = 'none';
            domB.style.transition = 'none';
            // set absolute position relative to arena
            const arenaRect = document.querySelector('.shell-arena').getBoundingClientRect();
            const getRelativePos = (slotIdx) => {
                const center = getSlotCenter(slotIdx);
                return { x: center.x, y: center.y };
            };
            let startA = getRelativePos(slotA);
            let startB = getRelativePos(slotB);
            domA.style.position = 'absolute';
            domA.style.left = startA.x + 'px';
            domA.style.top = startA.y + 'px';
            domA.style.transform = 'translate(-50%, -50%)';
            domA.style.width = '110px';
            domA.style.height = '90px';
            domA.style.zIndex = '30';
            domB.style.position = 'absolute';
            domB.style.left = startB.x + 'px';
            domB.style.top = startB.y + 'px';
            domB.style.transform = 'translate(-50%, -50%)';
            domB.style.width = '110px';
            domB.style.height = '90px';
            domB.style.zIndex = '30';
            // add arc path using custom easing
            function step(now) {
                const elapsed = now - startTime;
                let t = Math.min(1, elapsed / duration);
                // ease in-out cubic
                const ease = t<0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
                // arc: A goes up then down, B goes down then up
                const arcA = Math.sin(t * Math.PI) * 35; // upward arc
                const arcB = -Math.sin(t * Math.PI) * 35; // downward arc
                const currentXA = startA.x + (endPos.x - startA.x) * ease;
                const currentYA = startA.y + (endPos.y - startA.y) * ease + arcA;
                const currentXB = startB.x + (endPosB.x - startB.x) * ease;
                const currentYB = startB.y + (endPosB.y - startB.y) * ease + arcB;
                domA.style.left = currentXA + 'px';
                domA.style.top = currentYA + 'px';
                domB.style.left = currentXB + 'px';
                domB.style.top = currentYB + 'px';
                // add slight rotation
                const rotA = Math.sin(t * Math.PI) * 15;
                const rotB = Math.sin(t * Math.PI) * -15;
                domA.style.transform = `translate(-50%, -50%) rotate(${rotA}deg)`;
                domB.style.transform = `translate(-50%, -50%) rotate(${rotB}deg)`;
                if(t < 1) requestAnimationFrame(step);
                else {
                    // finish: attach to new slots
                    const targetSlotA = slotContainer.children[slotB];
                    const targetSlotB = slotContainer.children[slotA];
                    targetSlotA.appendChild(domA);
                    targetSlotB.appendChild(domB);
                    // reset styles
                    domA.style.position = '';
                    domA.style.left = '';
                    domA.style.top = '';
                    domA.style.transform = '';
                    domA.style.width = '';
                    domA.style.height = '';
                    domA.style.zIndex = '';
                    domA.style.transition = origTransition;
                    domB.style.position = '';
                    domB.style.left = '';
                    domB.style.top = '';
                    domB.style.transform = '';
                    domB.style.width = '';
                    domB.style.height = '';
                    domB.style.zIndex = '';
                    domB.style.transition = origTransition;
                    // update slot indices
                    shellA.slotIndex = slotB;
                    shellB.slotIndex = slotA;
                    if(onComplete) onComplete();
                }
            }
            requestAnimationFrame(step);
        }
        // perform multiple swaps
        function performShuffleSequence(swapCount, onComplete) {
            if(swapCount <= 0) { if(onComplete) onComplete(); return; }
            let remaining = swapCount;
            function doSwap() {
                if(remaining <= 0) { if(onComplete) onComplete(); return; }
                // pick two different shells
                let idxA = Math.floor(Math.random() * shells.length);
                let idxB = Math.floor(Math.random() * shells.length);
                while(idxA === idxB) idxB = Math.floor(Math.random() * shells.length);
                const shellA = shells[idxA];
                const shellB = shells[idxB];
                playSwapSound();
                animateArcSwap(shellA, shellB, () => {
                    remaining--;
                    doSwap();
                });
            }
            doSwap();
        }
        // ---------- GAME LOGIC ----------
        function startRound() {
            if(isShuffling) return;
            clearTimeout(autoRoundTimer);
            gameActive = false;
            // reset any active highlights
            shells.forEach(s => s.dom.classList.remove('active', 'revealed'));
            // place ball under random shell
            const randomIdx = Math.floor(Math.random() * shells.length);
            activeBallShellId = shells[randomIdx].id;
            shells.forEach(s => { s.hasBall = (s.id === activeBallShellId); });
            // reveal ball
            const ballShell = shells.find(s => s.hasBall);
            ballShell.dom.classList.add('active');
            setMessage("👀 WATCH THE BALL... 👀", "#7ffbff");
            // after 1.3 sec, hide ball and shuffle
            setTimeout(() => {
                // hide ball
                shells.forEach(s => s.dom.classList.remove('active'));
                setMessage("🌀 SHUFFLING... FOLLOW THE SHELL 🌀", "#ffd966");
                isShuffling = true;
                const swaps = 9 + Math.floor(Math.random() * 7); // 9-15 swaps
                performShuffleSequence(swaps, () => {
                    isShuffling = false;
                    gameActive = true;
                    setMessage("🎯 PICK A SHELL! 🎯", "#ffd966");
                    // add subtle glow to shells
                    shells.forEach(s => s.dom.style.filter = "drop-shadow(0 0 6px gold)");
                    setTimeout(() => shells.forEach(s => s.dom.style.filter = ""), 800);
                });
            }, 1300);
        }
        function pickShell(shellId) {
            if(!gameActive || isShuffling) return;
            const chosen = shells.find(s => s.id === shellId);
            if(!chosen) return;
            gameActive = false;
            // reveal the ball location
            const ballShell = shells.find(s => s.hasBall);
            ballShell.dom.classList.add('active');
            ballShell.dom.classList.add('revealed');
            chosen.dom.classList.add('revealed');
            if(chosen.hasBall) {
                const points = 10 + (streak * 2);
                score += points;
                streak++;
                updateUI();
                playWin();
                setMessage(`🎉 CORRECT! +${points} POINTS! STREAK ${streak}! 🎉`, "#8cff4f");
                autoRoundTimer = setTimeout(() => startRound(), 1400);
            } else {
                streak = 0;
                updateUI();
                playLose();
                setMessage(`❌ WRONG! BALL WAS UNDER SHELL ${ballShell.slotIndex+1}. ❌`, "#ff7777");
                autoRoundTimer = setTimeout(() => startRound(), 1800);
            }
        }
        function resetScore() {
            clearTimeout(autoRoundTimer);
            if(isShuffling) return;
            score = 0;
            streak = 0;
            updateUI();
            gameActive = false;
            shells.forEach(s => s.dom.classList.remove('active', 'revealed'));
            setMessage("✨ SCORE RESET! PRESS START ✨", "#ffd966");
        }
        function startGame() {
            if(isShuffling) return;
            initAudio();
            clearTimeout(autoRoundTimer);
            score = 0;
            streak = 0;
            updateUI();
            initShells();   // fresh shells with correct positioning
            startRound();
        }
        // ---------- BIND EVENTS ----------
        function bindEvents() {
            const startBtn = document.getElementById('startBtn');
            const resetBtn = document.getElementById('resetBtn');
            startBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); startGame(); });
            resetBtn.addEventListener('pointerdown', (e) => { e.preventDefault(); initAudio(); resetScore(); });
        }
        // ---------- INIT ----------
        function init() {
            initShells();
            bindEvents();
            highScore = loadHighScore();
            highScoreDisplay.innerText = highScore;
            updateUI();
            gameActive = false;
            isShuffling = false;
            setMessage("🕹️ PRESS START GAME 🕹️", "#0ff");
        }
        init();
        document.body.addEventListener('pointerdown', () => { if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume(); }, { once: true });
    })();
</script>
</body>
</html>
