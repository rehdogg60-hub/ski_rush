<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Reh Dogg Games Plus | Shell Shock Arcade</title>
    <style>
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        html, body {
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #0a0f2a, #02030c);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'VT323', monospace;
            padding: 20px;
        }

        .cabinet {
            background: linear-gradient(145deg, #0f122e, #050714);
            border-radius: 48px;
            padding: 20px 24px 30px;
            border: 3px solid #ffd966;
            box-shadow: 0 0 0 6px #2a1e3a, 0 20px 40px black, inset 0 0 20px rgba(255, 217, 0, 0.3);
            max-width: 700px;
            width: 100%;
        }

        .marquee {
            text-align: center;
            background: #010a15;
            border-radius: 24px;
            padding: 12px;
            margin-bottom: 24px;
            border-bottom: 3px solid #ffcc44;
            box-shadow: inset 0 0 12px gold, 0 6px 0 #3a2e1a;
        }

        .logo {
            font-size: clamp(1.2rem, 5vw, 2rem);
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #ffd966, #ffaa33, #ff5500);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 12px #ffaa33;
        }

        .sub {
            color: #7ffbff;
            font-size: 0.75rem;
            letter-spacing: 2px;
            margin-top: 6px;
        }

        .score-panel {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 24px;
        }

        .card {
            background: #030a1acc;
            backdrop-filter: blur(4px);
            border-radius: 28px;
            padding: 8px 12px;
            flex: 1;
            text-align: center;
            border: 1px solid #ffd966;
            box-shadow: 0 5px 0 #001e2a;
        }

        .card-label {
            font-size: 0.7rem;
            color: #8dd0ff;
            letter-spacing: 1px;
        }

        .card-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffd966;
            text-shadow: 0 0 8px #ffaa33;
        }

        /* Shell Arena */
        .shell-arena {
            position: relative;
            min-height: 200px;
            margin: 30px 0 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .shell-track {
            position: relative;
            width: 100%;
            height: 160px;
            display: flex;
            justify-content: center;
            gap: 30px;
        }

        .shell {
            position: relative;
            width: 110px;
            height: 130px;
            background: radial-gradient(ellipse at 30% 25%, #e67e22, #b85e0a);
            border-radius: 0 0 35% 35% / 0 0 40% 40%;
            cursor: pointer;
            transition: transform 0.1s ease;
            border-bottom: 6px solid #7e3a0a;
            box-shadow: 0 12px 0 #5a2c06, inset 0 2px 8px rgba(255,215,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            /* for animation */
            will-change: left;
        }

        .shell::before {
            content: "";
            position: absolute;
            top: -12px;
            left: 12px;
            width: 80%;
            height: 20px;
            background: #f39c12;
            border-radius: 50%;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }

        .shell .ball-icon {
            font-size: 2.8rem;
            position: absolute;
            bottom: 12px;
            left: 50%;
            transform: translateX(-50%);
            display: none;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.5));
            pointer-events: none;
        }

        .shell.active .ball-icon {
            display: block;
        }

        /* Shuffle animation class */
        .shell.swapping {
            transition: transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            z-index: 10;
        }

        .message-area {
            background: #021a24aa;
            border-radius: 60px;
            padding: 12px;
            margin: 20px 0;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            backdrop-filter: blur(8px);
            border: 1px solid cyan;
            min-height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message-text {
            text-shadow: 0 0 6px cyan;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
        }

        .arcade-btn {
            background: #1f1a2e;
            border: none;
            font-family: monospace;
            font-weight: bold;
            font-size: 1.1rem;
            padding: 12px 28px;
            border-radius: 60px;
            color: #ffdf8c;
            box-shadow: 0 6px 0 #2a1a3a;
            cursor: pointer;
            transition: 0.05s linear;
            touch-action: manipulation;
        }

        .arcade-btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #2a1a3a;
        }

        @media (max-width: 550px) {
            .shell { width: 85px; height: 100px; }
            .shell .ball-icon { font-size: 2rem; bottom: 6px; }
            .card-value { font-size: 1.2rem; }
            .arcade-btn { padding: 8px 18px; font-size: 0.9rem; }
            .message-area { font-size: 1rem; }
        }
    </style>
</head>
<body>
<div class="cabinet">
    <div class="marquee">
        <div class="logo">🔥 REH DOGG: SHELL SHOCK 🔥</div>
        <div class="sub">⚡ REAL SHUFFLE · TRACK THE BALL ⚡</div>
    </div>

    <div class="score-panel">
        <div class="card"><div class="card-label">🎲 SCORE</div><div class="card-value" id="scoreDisplay">0</div></div>
        <div class="card"><div class="card-label">🏆 HIGH SCORE</div><div class="card-value" id="highScoreDisplay">0</div></div>
        <div class="card"><div class="card-label">🎯 STREAK</div><div class="card-value" id="streakDisplay">0</div></div>
    </div>

    <div class="shell-arena">
        <div class="shell-track" id="shellTrack">
            <div class="shell" data-id="0"></div>
            <div class="shell" data-id="1"></div>
            <div class="shell" data-id="2"></div>
        </div>
    </div>

    <div class="message-area" id="gameMessage">
        <span class="message-text">🕹️ PRESS START TO PLAY 🕹️</span>
    </div>

    <div class="controls">
        <button class="arcade-btn" id="startBtn">🌀 START GAME</button>
        <button class="arcade-btn" id="resetBtn">🔄 RESET SCORE</button>
    </div>
</div>

<script>
    (function(){
        // ----------------------------- AUDIO (arcade beeps) -----------------------------
        const SafeAudio = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let soundEnabled = true;

        function initAudio() {
            if (!SafeAudio) { soundEnabled = false; return; }
            if (!audioCtx) audioCtx = new SafeAudio();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playBeep(freq=880, dur=0.12, vol=0.2) {
            if (!audioCtx || !soundEnabled) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.frequency.value = freq;
                gain.gain.value = vol;
                osc.type = 'sine';
                osc.start();
                gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + dur);
                osc.stop(audioCtx.currentTime + dur);
            } catch(e) {}
        }

        function playWin() {
            playBeep(880,0.1,0.25);
            setTimeout(()=>playBeep(1100,0.12,0.25),80);
            setTimeout(()=>playBeep(1320,0.15,0.2),160);
        }

        function playLose() {
            playBeep(440,0.2,0.22);
            setTimeout(()=>playBeep(330,0.25,0.2),150);
        }

        function playShuffleSound() {
            playBeep(660,0.05,0.15);
            setTimeout(()=>playBeep(550,0.05,0.15),60);
            setTimeout(()=>playBeep(440,0.05,0.15),120);
        }

        // ----------------------------- STORAGE -----------------------------
        const STORAGE_KEY = 'rehdogg_shell_high';
        function loadHighScore() {
            try { return parseInt(localStorage.getItem(STORAGE_KEY),10) || 0; } catch(e){ return 0; }
        }
        function saveHighScore(val) { try { localStorage.setItem(STORAGE_KEY, String(val)); } catch(e){} }

        // ----------------------------- DOM ELEMENTS -----------------------------
        const shellTrack = document.getElementById('shellTrack');
        let shells = [];
        let scoreDisplay = document.getElementById('scoreDisplay');
        let highScoreDisplay = document.getElementById('highScoreDisplay');
        let streakDisplay = document.getElementById('streakDisplay');
        let messageSpan = document.querySelector('#gameMessage .message-text');
        
        // ----------------------------- GAME STATE -----------------------------
        let ballIndex = 0;           // which shell currently holds the ball (index in shells array)
        let gameActive = false;
        let score = 0;
        let highScore = 0;
        let streak = 0;
        let isShuffling = false;
        let autoRoundTimer = null;

        function updateUI() {
            scoreDisplay.innerText = score;
            streakDisplay.innerText = streak;
            if (score > highScore) {
                highScore = score;
                highScoreDisplay.innerText = highScore;
                saveHighScore(highScore);
            }
        }

        function setMessage(text, color="#0ff") {
            if (messageSpan) {
                messageSpan.innerHTML = text;
                messageSpan.style.color = color;
            }
        }

        // Add ball icons to each shell
        function addBallIcons() {
            shells.forEach(shell => {
                if (!shell.querySelector('.ball-icon')) {
                    const ballSpan = document.createElement('span');
                    ballSpan.className = 'ball-icon';
                    ballSpan.textContent = '⚾';
                    shell.appendChild(ballSpan);
                }
            });
        }

        function hideAllBalls() {
            shells.forEach(s => s.classList.remove('active'));
        }

        function revealBall() {
            if (ballIndex >= 0 && ballIndex < shells.length) {
                shells[ballIndex].classList.add('active');
            }
        }

        // Animated swap between two shells (by their current DOM order)
        // We'll use transform translate to slide them, then reorder DOM and reset transforms
        function swapShellsWithAnimation(idxA, idxB, onComplete) {
            if (idxA === idxB) { if(onComplete) onComplete(); return; }
            const shellA = shells[idxA];
            const shellB = shells[idxB];
            
            // Get current positions relative to parent
            const rectA = shellA.getBoundingClientRect();
            const rectB = shellB.getBoundingClientRect();
            const trackRect = shellTrack.getBoundingClientRect();
            
            // Calculate offsets (how far each needs to move)
            const deltaX_A = rectB.left - rectA.left;
            const deltaX_B = rectA.left - rectB.left;
            
            // Apply transition style and transforms
            shellA.style.transition = 'transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1)';
            shellB.style.transition = 'transform 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1)';
            shellA.style.transform = `translateX(${deltaX_A}px)`;
            shellB.style.transform = `translateX(${deltaX_B}px)`;
            
            playShuffleSound();
            
            // After animation, swap DOM order, reset transforms, and update shells array
            setTimeout(() => {
                // swap in DOM
                if (shellA.nextSibling === shellB) {
                    shellTrack.insertBefore(shellB, shellA);
                } else {
                    shellTrack.insertBefore(shellA, shellB);
                }
                // reset transforms
                shellA.style.transform = '';
                shellB.style.transform = '';
                shellA.style.transition = '';
                shellB.style.transition = '';
                // update shells array to reflect new DOM order
                shells = Array.from(shellTrack.children);
                // re-index data-id
                shells.forEach((shell, i) => shell.setAttribute('data-id', i));
                // update ballIndex if the ball was in either swapped shell
                if (ballIndex === idxA) ballIndex = idxB;
                else if (ballIndex === idxB) ballIndex = idxA;
                if (onComplete) onComplete();
            }, 260);
        }

        // Perform a sequence of random swaps
        function performShuffleSequence(swapCount, onComplete) {
            if (swapCount <= 0) {
                if (onComplete) onComplete();
                return;
            }
            let remaining = swapCount;
            function doNextSwap() {
                if (remaining <= 0) {
                    if (onComplete) onComplete();
                    return;
                }
                // pick two different indices
                let a = Math.floor(Math.random() * shells.length);
                let b = Math.floor(Math.random() * shells.length);
                while (a === b) b = Math.floor(Math.random() * shells.length);
                swapShellsWithAnimation(a, b, () => {
                    remaining--;
                    doNextSwap();
                });
            }
            doNextSwap();
        }

        // Main round: show ball → hide → shuffle visibly → enable picking
        function startRound() {
            if (isShuffling) return;
            clearTimeout(autoRoundTimer);
            gameActive = false;
            
            // Reset positions (just in case any leftover transforms)
            shells.forEach(s => { s.style.transform = ''; s.style.transition = ''; });
            
            // Randomly place ball under one shell
            ballIndex = Math.floor(Math.random() * shells.length);
            
            // 1. Show ball
            hideAllBalls();
            revealBall();
            setMessage("👀 WATCH THE BALL... 👀", "#7ffbff");
            
            // 2. Hide ball after 1.2 sec, then shuffle
            setTimeout(() => {
                hideAllBalls();
                setMessage("🌀 SHUFFLING SHELLS... FOLLOW THE CUP 🌀", "#ffd966");
                isShuffling = true;
                // Perform 8-12 visible swaps
                const swaps = 8 + Math.floor(Math.random() * 5);
                performShuffleSequence(swaps, () => {
                    isShuffling = false;
                    gameActive = true;
                    setMessage("🎯 PICK A CUP! 🎯", "#ffd966");
                });
            }, 1200);
        }

        // Player picks a shell
        function pickShell(index) {
            if (isShuffling) {
                setMessage("⏳ SHUFFLING... WAIT ⏳", "#ffaa88");
                return;
            }
            if (!gameActive) {
                setMessage("⚠️ PRESS 'START GAME' FIRST! ⚠️", "#ff8888");
                return;
            }
            
            // reveal ball's true location
            revealBall();
            gameActive = false;
            
            if (index === ballIndex) {
                // correct
                const points = 10 + (streak * 2);
                score += points;
                streak++;
                updateUI();
                playWin();
                setMessage(`🎉 CORRECT! +${points} POINTS! STREAK ${streak}! 🎉`, "#8cff4f");
                autoRoundTimer = setTimeout(() => startRound(), 1400);
            } else {
                // wrong
                streak = 0;
                updateUI();
                playLose();
                setMessage(`❌ WRONG! BALL WAS UNDER CUP ${ballIndex+1}. ❌`, "#ff7777");
                autoRoundTimer = setTimeout(() => startRound(), 1800);
            }
        }

        function resetScore() {
            clearTimeout(autoRoundTimer);
            if (isShuffling) return;
            score = 0;
            streak = 0;
            updateUI();
            gameActive = false;
            hideAllBalls();
            setMessage("✨ SCORE RESET! PRESS START ✨", "#ffd966");
        }

        function startGame() {
            if (isShuffling) return;
            initAudio();
            clearTimeout(autoRoundTimer);
            // optional: reset score? Usually start fresh game with score=0 but keep high score
            score = 0;
            streak = 0;
            updateUI();
            startRound();
        }

        // Attach event listeners
        function bindEvents() {
            // refresh shell list and attach handlers
            shells = Array.from(shellTrack.children);
            shells.forEach((shell, idx) => {
                shell.removeEventListener('pointerdown', shell._handler);
                const handler = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    pickShell(idx);
                };
                shell.addEventListener('pointerdown', handler);
                shell._handler = handler;
                shell.setAttribute('data-id', idx);
            });
            
            const startBtn = document.getElementById('startBtn');
            const resetBtn = document.getElementById('resetBtn');
            
            startBtn.removeEventListener('pointerdown', startBtn._startHandler);
            const startHandler = (e) => {
                e.preventDefault();
                startGame();
            };
            startBtn.addEventListener('pointerdown', startHandler);
            startBtn._startHandler = startHandler;
            
            resetBtn.removeEventListener('pointerdown', resetBtn._resetHandler);
            const resetHandler = (e) => {
                e.preventDefault();
                initAudio();
                resetScore();
            };
            resetBtn.addEventListener('pointerdown', resetHandler);
            resetBtn._resetHandler = resetHandler;
        }
        
        // Initial setup
        function init() {
            shells = Array.from(shellTrack.children);
            addBallIcons();
            bindEvents();
            highScore = loadHighScore();
            highScoreDisplay.innerText = highScore;
            updateUI();
            setMessage("🕹️ PRESS START GAME TO BEGIN 🕹️", "#0ff");
            gameActive = false;
            isShuffling = false;
            hideAllBalls();
            ballIndex = 0;
        }
        
        init();
        
        // Resume audio on first touch
        document.body.addEventListener('pointerdown', () => {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        }, { once: true });
    })();
</script>
</body>
</html>
